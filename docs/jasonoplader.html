<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>CSV bestand naar links.json</title>
<link rel="icon" href="data:,">
<style>
body{
    font-family:Arial;
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
input,button{
    margin:10px 0;
    padding:8px;
}
pre{
    background:#f4f4f4;
    padding:15px;
    white-space:pre-wrap;
    overflow:auto;
}
</style>
</head>
<body>

<h2>CSV bestand naar links.json</h2>

<input type="file" id="fileInput" accept=".csv">
<br>
<button onclick="leesBestand()">Maak JSON</button>

<h3>Resultaat</h3>
<pre id="output"></pre>

<script>
function leesBestand() {

    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Kies eerst een CSV bestand");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {
        maakJson(e.target.result);
    };

    reader.readAsText(file);
}

function maakJson(csvText) {

    let lines = csvText.trim().split(/\r?\n/);

    let data = {};

    for (let i = 1; i < lines.length; i++) {

        let row = lines[i].split(",");

        if (row.length < 3) continue;

        let id = row[0].trim();
        let titel = row[1].trim();
        let url = row.slice(2).join(",").trim();

        if (!data[id]) data[id] = [];

        data[id].push({
            titel: titel,
            url: url
        });
    }

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
